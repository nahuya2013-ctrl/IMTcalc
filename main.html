<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Калькулятор Идеальности</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-color: #f8fafc;
            --accent-color: #38bdf8;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            background-color: var(--card-bg);
            padding: 30px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 450px;
            text-align: center;
            animation: fadeIn 0.8s ease-out;
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 25px;
            color: var(--accent-color);
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.9rem;
            color: #94a3b8;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            border-radius: 12px;
            border: 2px solid #334155;
            background-color: #0f172a;
            color: #fff;
            font-size: 1rem;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 0 4px rgba(56, 189, 248, 0.2);
        }

        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #38bdf8, #3b82f6);
            color: white;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 10px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(56, 189, 248, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        /* Спидометр */
        .gauge-wrapper {
            margin: 40px auto 20px;
            position: relative;
            width: 250px;
            height: 125px;
            overflow: hidden;
        }

        .gauge {
            width: 250px;
            height: 250px;
            border-radius: 50%;
            position: relative;
        }

        /* 5 цветных секторов в один конический градиент */
        .gauge-body {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: conic-gradient(
                from 270deg,
                #ef4444 0% 18%,   /* Красный (0-20) */
                #f97316 18% 36%,  /* Оранжевый (20-40) */
                #eab308 36% 54%,  /* Желтый (40-60) */
                #22c55e 54% 72%,  /* Зеленый (60-80) */
                #3b82f6 72% 90%,  /* Синий (80-100) */
                transparent 90% 100%
            );
            mask: radial-gradient(circle, transparent 65%, black 66%);
            -webkit-mask: radial-gradient(circle, transparent 65%, black 66%);
        }

        .gauge-arrow {
            position: absolute;
            bottom: 0;
            left: 50%;
            width: 6px;
            height: 90px;
            background-color: #fff;
            border-radius: 4px;
            transform-origin: bottom center;
            transform: translateX(-50%) rotate(-90deg);
            transition: transform 1.5s cubic-bezier(0.25, 1, 0.5, 1);
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
            z-index: 2;
        }

        .gauge-center {
            position: absolute;
            bottom: -10px;
            left: calc(50% - 10px);
            width: 20px;
            height: 20px;
            background-color: #fff;
            border-radius: 50%;
            z-index: 3;
        }

        .result-text {
            font-size: 2rem;
            font-weight: 700;
            margin-top: 10px;
            min-height: 40px;
            animation: pulse 2s infinite;
        }

        .verdict {
            font-size: 1.1rem;
            color: #94a3b8;
            margin-top: 5px;
            min-height: 25px;
        }

        /* Анимации */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes scorePop {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); color: var(--accent-color); }
            100% { transform: scale(1); }
        }

        .pop-animation {
            animation: scorePop 0.5s ease-out;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Оценка параметров</h1>
    
    <div class="input-group">
        <label for="age">Возраст (лет)</label>
        <input type="number" id="age" placeholder="Например: 25" min="1" max="120">
    </div>
    
    <div class="input-group">
        <label for="height">Рост (см)</label>
        <input type="number" id="height" placeholder="Например: 175" min="50" max="250">
    </div>
    
    <div class="input-group">
        <label for="weight">Вес (кг)</label>
        <input type="number" id="weight" placeholder="Например: 70" min="10" max="300">
    </div>
    
    <button onclick="calculateScore()">Рассчитать оценку</button>

    <div class="gauge-wrapper">
        <div class="gauge">
            <div class="gauge-body"></div>
            <div class="gauge-arrow" id="arrow"></div>
            <div class="gauge-center"></div>
        </div>
    </div>

    <div class="result-text" id="scoreDisplay">0</div>
    <div class="verdict" id="verdictDisplay">Введите данные</div>
</div>

<script>
    function calculateScore() {
        const age = parseFloat(document.getElementById('age').value);
        const height = parseFloat(document.getElementById('height').value);
        const weight = parseFloat(document.getElementById('weight').value);

        if (!age || !height || !weight) {
            alert('Пожалуйста, заполните все поля корректно.');
            return;
        }

        // Логика расчета ИМТ (Индекс массы тела)
        const heightInMeters = height / 100;
        const bmi = weight / (heightInMeters * heightInMeters);

        // Расчет идеального ИМТ с легкой поправкой на возраст
        let idealBmi = 22;
        if (age < 20) idealBmi = 21;
        if (age > 50) idealBmi = 24;

        // Отклонение от идеала
        const diff = Math.abs(bmi - idealBmi);
        
        // Перевод отклонения в шкалу 0-100 (где 100 — идеальное совпадение)
        let score = 100 - (diff * 8); 
        score = Math.max(0, Math.min(100, Math.round(score))); // Ограничиваем рамками 0-100

        // Вердикты и управление анимацией стрелки
        let textVerdict = "";
        if (score >= 80) textVerdict = "Отличные параметры! 🎉";
        else if (score >= 60) textVerdict = "Хорошая норма 👍";
        else if (score >= 40) textVerdict = "Есть небольшие отклонения ⚖️";
        else if (score >= 20) textVerdict = "Стоит обратить внимание на здоровье 🏃‍♂️";
        else textVerdict = "Критическое отклонение от нормы ⚠️";

        // Поворот стрелки полукруга (-90 градусов это 0, +90 градусов это 100)
        const degrees = -90 + (score * 1.8);
        const arrow = document.getElementById('arrow');
        arrow.style.transform = `translateX(-50%) rotate(${degrees}deg)`;

        // Анимация цифр счета
        const scoreDisplay = document.getElementById('scoreDisplay');
        const verdictDisplay = document.getElementById('verdictDisplay');
        
        scoreDisplay.classList.remove('pop-animation');
        void scoreDisplay.offsetWidth; // Сброс анимации для повторного запуска
        scoreDisplay.classList.add('pop-animation');

        // Счетчик цифр от 0 до результата
        let currentCount = 0;
        const duration = 1500; // Должно совпадать со временем анимации стрелки в CSS
        const steps = 50;
        const stepTime = duration / steps;
        const increment = score / steps;

        const timer = setInterval(() => {
            currentCount += increment;
            if (currentCount >= score) {
                clearInterval(timer);
                scoreDisplay.textContent = score;
            } else {
                scoreDisplay.textContent = Math.round(currentCount);
            }
        }, stepTime);

        verdictDisplay.textContent = textVerdict;
    }
</script>

</body>
</html>
