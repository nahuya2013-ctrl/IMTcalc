<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Дружеский Калькулятор Параметров</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-color: #f8fafc;
            --accent-color: #38bdf8;
            --qwen-color: #7c3aed;
            --chat-bubble-bg: #0f172a;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            background-color: var(--card-bg);
            padding: 30px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 480px;
            text-align: center;
            animation: fadeIn 0.8s ease-out;
            display: flex;
            flex-direction: column;
        }

        h1 {
            font-size: 1.8rem;
            margin-top: 0;
            margin-bottom: 20px;
            color: var(--accent-color);
        }

        .input-group {
            margin-bottom: 15px;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-size: 0.9rem;
            color: #94a3b8;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            border-radius: 12px;
            border: 2px solid #334155;
            background-color: #0f172a;
            color: #fff;
            font-size: 1rem;
            box-sizing: border-box;
            transition: all 0.3s ease;
            -webkit-appearance: none;
        }

        input:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 0 4px rgba(56, 189, 248, 0.2);
        }

        .btn-calc {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #38bdf8, #3b82f6);
            color: white;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 10px;
            display: block;
            -webkit-appearance: none;
        }

        .btn-calc:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(56, 189, 248, 0.3);
        }

        /* Спидометр на 5 секторов */
        .gauge-wrapper {
            margin: 30px auto 15px;
            position: relative;
            width: 250px;
            height: 125px;
            overflow: hidden;
            pointer-events: none;
        }

        .gauge {
            width: 250px;
            height: 250px;
            border-radius: 50%;
            position: relative;
        }

        .gauge-body {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: conic-gradient(
                from 270deg,
                #ef4444 0% 18%,
                #f97316 18% 36%,
                #eab308 36% 54%,
                #84cc16 54% 72%,
                #22c55e 72% 90%,
                transparent 90% 100%
            );
            mask: radial-gradient(circle, transparent 65%, black 66%);
            -webkit-mask: radial-gradient(circle, transparent 65%, black 66%);
        }

        .gauge-arrow {
            position: absolute;
            bottom: 0;
            left: 50%;
            width: 6px;
            height: 90px;
            background-color: #fff;
            border-radius: 4px;
            transform-origin: bottom center;
            transform: translateX(-50%) rotate(-90deg);
            transition: transform 1.5s cubic-bezier(0.25, 1, 0.5, 1);
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
            z-index: 2;
        }

        .gauge-center {
            position: absolute;
            bottom: -10px;
            left: calc(50% - 10px);
            width: 20px;
            height: 20px;
            background-color: #fff;
            border-radius: 50%;
            z-index: 3;
        }

        .result-text {
            font-size: 2.2rem;
            font-weight: 700;
            margin-top: 5px;
            min-height: 45px;
        }

        .verdict {
            font-size: 1.1rem;
            color: #94a3b8;
            margin-bottom: 20px;
            min-height: 25px;
        }

        .btn-ai-trigger {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #a78bfa, #7c3aed);
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 5px;
            display: none;
            animation: fadeIn 0.5s ease-out;
        }

        .btn-ai-trigger:hover {
            box-shadow: 0 8px 16px rgba(124, 58, 237, 0.3);
            transform: scale(1.02);
        }

        /* Блок ручной отправки */
        .ai-box {
            background-color: #0f172a;
            border: 1px solid #334155;
            border-radius: 16px;
            padding: 20px;
            text-align: left;
            margin-top: 15px;
            display: none;
            animation: fadeIn 0.5s ease-out;
        }

        .ai-title {
            font-size: 1rem;
            font-weight: 600;
            color: #a78bfa;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* Окошко как в чате (Дизайн пузыря сообщения) */
        .chat-container {
            position: relative;
            background-color: var(--chat-bubble-bg);
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 14px;
            margin-bottom: 15px;
            box-sizing: border-box;
        }

        .chat-text {
            font-size: 0.9rem;
            color: #cbd5e1;
            line-height: 1.5;
            margin: 0;
            white-space: pre-wrap;
            word-break: break-word;
            padding-right: 5px;
            max-height: 120px;
            overflow-y: auto;
            text-align: left;
        }

        /* Кнопка скопировать внутри окошка чата */
        .btn-copy {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            width: 100%;
            margin-top: 10px;
            padding: 8px;
            background-color: #1e293b;
            border: 1px solid #475569;
            color: #cbd5e1;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-copy:hover {
            background-color: #334155;
            color: #fff;
        }

        .btn-copy.copied {
            background-color: #16a34a;
            border-color: #15803d;
            color: white;
        }

        .btn-qwen {
            width: 100%;
            padding: 12px;
            background-color: var(--qwen-color);
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            text-align: center;
            box-sizing: border-box;
            transition: background 0.2s;
        }

        .btn-qwen:hover {
            background-color: #6d28d9;
        }

        .instruction-list {
            margin-top: 15px;
            padding-left: 20px;
            font-size: 0.85rem;
            color: #94a3b8;
            line-height: 1.5;
        }

        .instruction-list li {
            margin-bottom: 6px;
        }

        /* Кнопка поддержки */
        .btn-support {
            margin-top: 25px;
            background: none;
            border: 1px dashed #475569;
            color: #94a3b8;
            padding: 10px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-block;
            align-self: center;
        }

        .btn-support:hover {
            border-color: var(--accent-color);
            color: #fff;
            background-color: rgba(56, 189, 248, 0.05);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .pop-animation {
            animation: scorePop 0.5s ease-out;
        }
        @keyframes scorePop {
            0% { transform: scale(1); }
            50% { transform: scale(1.15); color: var(--accent-color); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Оценка параметров</h1>
    
    <div class="input-group">
        <label for="age">Возраст (лет)</label>
        <input type="number" id="age" placeholder="Например: 25" min="1" max="120">
    </div>
    
    <div class="input-group">
        <label for="height">Рост (см)</label>
        <input type="number" id="height" placeholder="Например: 175" min="50" max="250">
    </div>
    
    <div class="input-group">
        <label for="weight">Вес (кг)</label>
        <input type="number" id="weight" placeholder="Например: 70" min="10" max="300">
