<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Дружеский Калькулятор Параметров</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-color: #f8fafc;
            --accent-color: #38bdf8;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            background-color: var(--card-bg);
            padding: 30px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 480px;
            text-align: center;
            animation: fadeIn 0.8s ease-out;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 20px;
            color: var(--accent-color);
        }

        .input-group {
            margin-bottom: 15px;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-size: 0.9rem;
            color: #94a3b8;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            border-radius: 12px;
            border: 2px solid #334155;
            background-color: #0f172a;
            color: #fff;
            font-size: 1rem;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 0 4px rgba(56, 189, 248, 0.2);
        }

        .btn-calc {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #38bdf8, #3b82f6);
            color: white;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 10px;
        }

        .btn-calc:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(56, 189, 248, 0.3);
        }

        /* Спидометр на 5 секторов */
        .gauge-wrapper {
            margin: 30px auto 15px;
            position: relative;
            width: 250px;
            height: 125px;
            overflow: hidden;
        }

        .gauge {
            width: 250px;
            height: 250px;
            border-radius: 50%;
            position: relative;
        }

        .gauge-body {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: conic-gradient(
                from 270deg,
                #ef4444 0% 18%,   /* Красный */
                #f97316 18% 36%,  /* Оранжевый */
                #eab308 36% 54%,  /* Желтый */
                #84cc16 54% 72%,  /* Желто-зеленый */
                #22c55e 72% 90%,  /* Зеленый */
                transparent 90% 100%
            );
            mask: radial-gradient(circle, transparent 65%, black 66%);
            -webkit-mask: radial-gradient(circle, transparent 65%, black 66%);
        }

        .gauge-arrow {
            position: absolute;
            bottom: 0;
            left: 50%;
            width: 6px;
            height: 90px;
            background-color: #fff;
            border-radius: 4px;
            transform-origin: bottom center;
            transform: translateX(-50%) rotate(-90deg);
            transition: transform 1.5s cubic-bezier(0.25, 1, 0.5, 1);
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
            z-index: 2;
        }

        .gauge-center {
            position: absolute;
            bottom: -10px;
            left: calc(50% - 10px);
            width: 20px;
            height: 20px;
            background-color: #fff;
            border-radius: 50%;
            z-index: 3;
        }

        .result-text {
            font-size: 2.2rem;
            font-weight: 700;
            margin-top: 5px;
            min-height: 45px;
        }

        .verdict {
            font-size: 1.1rem;
            color: #94a3b8;
            margin-bottom: 20px;
            min-height: 25px;
        }

        /* Блок ИИ рекомендаций */
        .ai-box {
            background-color: #0f172a;
            border: 1px solid #334155;
            border-radius: 16px;
            padding: 15px;
            text-align: left;
            margin-top: 15px;
            display: none;
            animation: fadeIn 0.5s ease-out;
        }

        .ai-title {
            font-size: 0.95rem;
            font-weight: 600;
            color: #a78bfa;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .ai-content {
            font-size: 0.9rem;
            color: #cbd5e1;
            line-height: 1.5;
        }

        .loading-dots::after {
            content: ' .';
            animation: dots 1s steps(5, end) infinite;
        }

        /* Кнопка поддержки */
        .btn-support {
            margin-top: 25px;
            background: none;
            border: 1px dashed #475569;
            color: #94a3b8;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-block;
            align-self: center;
        }

        .btn-support:hover {
            border-color: var(--accent-color);
            color: #fff;
            background-color: rgba(56, 189, 248, 0.05);
        }

        /* Анимации */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes scorePop {
            0% { transform: scale(1); }
            50% { transform: scale(1.15); color: var(--accent-color); }
            100% { transform: scale(1); }
        }

        @keyframes dots {
            0%, 20% { content: '.'; }
            40% { content: '..'; }
            60% { content: '...'; }
            80%, 100% { content: ''; }
        }

        .pop-animation {
            animation: scorePop 0.5s ease-out;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Оценка параметров</h1>
    
    <div class="input-group">
        <label for="age">Возраст (лет)</label>
        <input type="number" id="age" placeholder="Например: 25" min="1" max="120">
    </div>
    
    <div class="input-group">
        <label for="height">Рост (см)</label>
        <input type="number" id="height" placeholder="Например: 175" min="50" max="250">
    </div>
    
    <div class="input-group">
        <label for="weight">Вес (кг)</label>
        <input type="number" id="weight" placeholder="Например: 70" min="10" max="300">
    </div>
    
    <button class="btn-calc" onclick="calculateScore()">Рассчитать оценку</button>

    <div class="gauge-wrapper">
        <div class="gauge">
            <div class="gauge-body"></div>
            <div class="gauge-arrow" id="arrow"></div>
            <div class="gauge-center"></div>
        </div>
    </div>

    <div class="result-text" id="scoreDisplay">0</div>
    <div class="verdict" id="verdictDisplay">Введите данные</div>

    <!-- Блок ИИ -->
    <div class="ai-box" id="aiBox">
        <div class="ai-title">🤖 Твой ИИ-Друг говорит:</div>
        <div class="ai-content" id="aiContent">Обдумываю ответ для друга...</div>
    </div>

    <!-- Кнопка поддержки -->
    <a href="mailto:gitmoderate@gmail.com" class="btn-support">💬 Поддержка: gitmoderate@gmail.com</a>
</div>

<script>
    function calculateScore() {
        const age = parseFloat(document.getElementById('age').value);
        const height = parseFloat(document.getElementById('height').value);
        const weight = parseFloat(document.getElementById('weight').value);

        if (!age || !height || !weight) {
            alert('Дружище, заполни все поля, чтобы я мог посчитать!');
            return;
        }

        const heightInMeters = height / 100;
        const bmi = weight / (heightInMeters * heightInMeters);

        let idealBmi = 22;
        if (age < 20) idealBmi = 21;
        if (age > 50) idealBmi = 24;

        const diff = Math.abs(bmi - idealBmi);
        
        let score = 100 - (diff * 8); 
        score = Math.max(0, Math.min(100, Math.round(score)));

        // Дружелюбные вердикты для шкалы
        let textVerdict = "";
        if (score >= 80) textVerdict = "Ты в идеальной форме! Зеленая зона 🌟";
        else if (score >= 60) textVerdict = "Отличный результат, всё супер! Желто-зеленая зона 👍";
        else if (score >= 40) textVerdict = "Нормально, но можно чуть лучше. Желтая зона ⚖️";
        else if (score >= 20) textVerdict = "Обрати внимание на баланс. Оранжевая зона 🏃‍♂️";
        else textVerdict = "Береги себя, нужно поработать над формой! Красная зона ❤️";

        const degrees = -90 + (score * 1.8);
        document.getElementById('arrow').style.transform = `translateX(-50%) rotate(${degrees}deg)`;

        const scoreDisplay = document.getElementById('scoreDisplay');
        const verdictDisplay = document.getElementById('verdictDisplay');
        
        scoreDisplay.classList.remove('pop-animation');
        void scoreDisplay.offsetWidth; 
        scoreDisplay.classList.add('pop-animation');

        let currentCount = 0;
